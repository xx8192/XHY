<body class="bg-gray-100 min-h-screen">

</div>

</div>

let currentChapterIndex = 0;
let questionList = [];

function toggleAllAnswer(){
    showAllAnswer = !showAllAnswer;
    const btn = document.getElementById("toggleAllAnsBtn");
    btn.innerText = showAllAnswer ? "隐藏全部答案" : "显示全部答案";
    render();
}

function openChapter(idx){
    currentChapterIndex = idx;
    questionList = JSON.parse(JSON.stringify(allChapters[idx].list));
    showAllAnswer = false;
    document.getElementById("toggleAllAnsBtn").innerText = "显示全部答案";
    document.getElementById("chapter-title").innerText = allChapters[idx].title;
    document.getElementById("page-index").classList.add("hidden");
    document.getElementById("page-exercise").classList.remove("hidden");
    render();
}

function backIndex(){
    document.getElementById("page-exercise").classList.add("hidden");
    document.getElementById("page-index").classList.remove("hidden");
}

const wrapDom = document.getElementById("questions-wrap");
const gridDom = document.getElementById("answer-grid");

function render(){
    renderQuestion();
    renderAnswerCard();
    computeStat();
}

function checkAnswerFinish(userStr, ansStr){
    let userSort = userStr.split("").sort().join("");
    let ansSort = ansStr.split("").sort().join("");
    return userSort === ansSort;
}

function renderQuestion(){
    wrapDom.innerHTML = "";
    questionList.forEach((item,index)=>{
        const div = document.createElement("div");
        div.className = "question-card border rounded-lg p-5 mb-6";
        div.id="q-"+index;
        let optHtml = "";
        item.opts.forEach((opt,optIdx)=>{
            const optVal = opt.charAt(0);
            let cls = "option-item rounded px-4 py-2 my-2 block";
            if(item.user && item.user.includes(optVal)) cls += " option-selected";
            optHtml += `<div class="${cls}" data-q="${index}" data-val="${optVal}">${opt}</div>`;
        })
        let ansTip = "";
        //单选选完立即判定，多选必须凑齐正确组合才判定
        if(item.user){
            const isMulti = item.ans.length > 1;
            if(!isMulti){
                let isRight = item.user === item.ans;
                ansTip = isRight 
                    ? `<div class="mt-4 answer-correct">✅回答正确，标准答案：${item.ans}</div>`
                    : `<div class="mt-4 answer-wrong">❌回答错误，标准答案：${item.ans}</div>`;
            }else{
                //多选选满正确数量再判断
                if(item.user.length === item.ans.length){
                    let isRight = checkAnswerFinish(item.user, item.ans);
                    ansTip = isRight 
                        ? `<div class="mt-4 answer-correct">✅回答正确，标准答案：${item.ans}</div>`
                        : `<div class="mt-4 answer-wrong">❌回答错误，标准答案：${item.ans}</div>`;
                }
            }
        }
        let allAnsTip = showAllAnswer ? `<div class="mt-3 ans-all-show">本题标准答案：${item.ans}</div>` : "";
        div.innerHTML = `
            <div class="font-semibold text-lg mb-3 whitespace-pre-wrap">${item.title}</div>
            <div class="opts-area">${optHtml}</div>
            ${ansTip}${allAnsTip}
        `;
        wrapDom.appendChild(div);
    })
    bindClick();
}

function renderAnswerCard(){
    gridDom.innerHTML = "";
    questionList.forEach((item,idx)=>{
        let cls="card-num num-undone";
        if(item.user){
            let judged = false;
            let isRight = false;
            if(item.ans.length > 1){
                if(item.user.length === item.ans.length){
                    judged = true;
                    isRight = checkAnswerFinish(item.user, item.ans);
                }
            }else{
                judged = true;
                isRight = item.user === item.ans;
            }
            if(judged){
                cls = isRight ? "card-num num-done-correct" : "card-num num-done-wrong";
            }
        }
        const span=document.createElement("div");
        span.className=cls;
        span.innerText=idx+1;
        span.onclick=()=>document.getElementById("q-"+idx).scrollIntoView({behavior:'smooth'});
        gridDom.appendChild(span);
    })
}

function computeStat(){
    let done=0,right=0,error=0;
    let errorArr=[];
    questionList.forEach((v,i)=>{
        if(v.user){
            let judged = false;
            let isRight = false;
            if(v.ans.length > 1){
                if(v.user.length === v.ans.length){
                    judged = true;
                    isRight = checkAnswerFinish(v.user, v.ans);
                }
            }else{
                judged = true;
                isRight = v.user === v.ans;
            }
            if(judged){
                done++;
                isRight ? right++ : (error++, errorArr.push(i+1));
            }
        }
    })
    document.getElementById("total-count").innerText=questionList.length;
    document.getElementById("done-count").innerText=done;
    document.getElementById("right-count").innerText=right;
    document.getElementById("error-count").innerText=error;
    let rate= done===0 ? 0 : ((right/done)*100).toFixed(1);
    document.getElementById("rate-text").innerText=rate+"%";

    if(done===questionList.length){
        document.getElementById("error-info").classList.remove("hidden");
        document.getElementById("error-list").innerText= errorArr.length>0 ? errorArr.join("、") : "暂无错题";
    }else{
        document.getElementById("error-info").classList.add("hidden");
    }
}

function bindClick(){
    document.querySelectorAll(".option-item").forEach(el=>{
        el.onclick = function(){
            const qIdx = Number(this.dataset.q);
            const val = this.dataset.val;
            const targetItem = questionList[qIdx];
            if(targetItem.ans.length > 1){
                if(!targetItem.user) targetItem.user = val;
                else if(targetItem.user.includes(val)){
                    targetItem.user = targetItem.user.replace(val,"");
                }else{
                    targetItem.user += val;
                }
            }else{
                targetItem.user = val;
            }
            render();
        }
    })
}

function resetAll(){
    questionList.forEach(item=>item.user="");
    showAllAnswer = false;
    document.getElementById("toggleAllAnsBtn").innerText = "显示全部答案";
    render();
}
</script>
</body>
</html>
